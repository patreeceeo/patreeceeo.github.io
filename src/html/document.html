    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>${title}</title>
    <link rel="shortcut icon" href="/static/images/me.png">

    <!-- Facebook share metadata -->
    <meta property="og:title" content="${title}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="TODO">
    <meta property="og:image" content="shareimg.jpg">

    <!-- Twitter share metadata -->

    <meta name="twitter:description" content="TODO">
    <meta name="twitter:image" content="shareimg.jpg">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" media="screen" href="/static/styles/reset.css" >
    <link rel="stylesheet" media="screen" href="/static/styles/fluid.css">
    <link rel="stylesheet" media="screen" href="/static/styles/modular-scale.css">
    <link rel="stylesheet" media="screen" href="/static/styles/typography.css">
    <link rel="stylesheet" media="screen" href="/static/styles/color.css">
    <link rel="stylesheet" media="screen" href="/static/styles/u.css">
    <link rel="stylesheet" media="screen" href="/static/styles/web-font.css">
    ${$styleSheetLinks}

    <style>

      :root {
        --spacing-horizontal: min(2em, 5vw);
        --spacing-vertical: 2em;
        --page-width: calc(50rem - var(--spacing-horizontal) * 2);
        --page-w-sidebar-width: calc(var(--page-width) - var(--spacing-horizontal));
        --sidebar-max-width: 20%;
      }


      .page {
        max-width: 100%;
        width: var(--page-width);
        padding: 0 var(--spacing-horizontal);
        margin: var(--spacing-vertical) auto;
      }

      .sidebar + .page {
        max-width: var(--page-w-sidebar-max-width);
      }

      .page pre {
        overflow-x: scroll;
      }

      .page ul {
        list-style-type: "٭ ";
      }

      .page ul,
      .page ol {
        margin-inline-start: 2em;
      }

      .page li::marker {
        padding: 0 1em;
      }

      .page figure,
      .page pre {
        margin-bottom: 1rem;
      }

      .sidebar {
        max-width: var(--sidebar-max-width);
      }

    </style>
  </head>
